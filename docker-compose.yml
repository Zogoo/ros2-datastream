x-ros-env: &ros-env
  ROS_DISTRO: lyrical
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  FASTDDS_BUILTIN_TRANSPORTS: UDPv4
  RCUTILS_LOGGING_BUFFERED_STREAM: "1"
  RCUTILS_COLORIZED_OUTPUT: "1"
  SAVE_DATASET: ${SAVE_DATASET:-false}

x-ros-base: &ros-base
  build: .
  image: onsen-ros:latest
  network_mode: host
  restart: unless-stopped

services:
  dummy_robot:
    <<: *ros-base
    environment:
      <<: *ros-env
    volumes:
      - ./dataset:/ros2_ws/dataset
      - ./output:/ros2_ws/output
    command: ros2 run onsen_dummy_robot dummy_stream_node

  ai_worker:
    <<: *ros-base
    environment:
      <<: *ros-env
    command: ros2 run onsen_ai_worker ai_worker_node
    depends_on:
      - dummy_robot

  foxglove_bridge:
    <<: *ros-base
    environment:
      <<: *ros-env
    command: >
      ros2 launch foxglove_bridge foxglove_bridge_launch.xml
      port:=8765
      address:=0.0.0.0

  rosbridge:
    <<: *ros-base
    environment:
      <<: *ros-env
    command: >
      ros2 launch rosbridge_server rosbridge_websocket_launch.xml
      port:=9090

  frontend:
    build:
      context: ./frontend
    image: onsen-frontend:latest
    network_mode: host
    restart: unless-stopped
    depends_on:
      - rosbridge

  rosbag_recorder:
    <<: *ros-base
    profiles: [record]
    environment:
      <<: *ros-env
    volumes:
      - ./bags:/bags
    command: >
      ros2 bag record
      --output /bags/onsen_dummy_run
      --storage mcap
      --topics
      /camera/front/image_raw
      /camera/front/image_raw/compressed
      /camera/front/camera_info
      /scan
      /odom
      /tf
      /tf_static
      /joint_states
      /arm/state
      /robot/events
      /detected_objects
      /task_plan

  rosbag_player:
    <<: *ros-base
    profiles: [play]
    environment:
      <<: *ros-env
    volumes:
      - ./bags:/bags
    command: ros2 bag play /bags/onsen_dummy_run --loop
